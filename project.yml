name: iCodexBar
options:
  bundleIdPrefix: com.icodexbar
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_ENTITLEMENTS: ""

configs:
  Debug:
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
  Release:
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  iCodexBar:
    type: application
    platform: iOS
    sources:
      - path: iCodexBar
        excludes:
          - "**/.DS_Store"
    resources:
      - path: iCodexBar/Resources
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.icodexbar.app
        INFOPLIST_FILE: iCodexBar/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: "YES"
    entitlements:
      path: iCodexBar/Resources/iCodexBar.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.icodexbar.shared
    dependencies:
      - target: iCodexBarWidgetExtension
        embed: true
        codeSign: true

  iCodexBarWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: iCodexBarWidget
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.icodexbar.app.widget
        INFOPLIST_FILE: iCodexBarWidget/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SKIP_INSTALL: "YES"
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
        CODE_SIGN_ENTITLEMENTS: iCodexBarWidget/iCodexBarWidgetExtension.entitlements
    entitlements:
      path: iCodexBarWidget/iCodexBarWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.icodexbar.shared

schemes:
  iCodexBar:
    build:
      targets:
        iCodexBar: all
        iCodexBarWidgetExtension: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
