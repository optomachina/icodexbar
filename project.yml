name: iCodexBar
options:
  bundleIdPrefix: com.icodexbar
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_ENTITLEMENTS: ""

# Run SwiftLint and SwiftFormat on build (optional, can be disabled)
# postCompileScripts:
#   - name: SwiftLint
#     script: swiftlint
#   - name: SwiftFormat
#     script: swiftformat .

configs:
  Debug:
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
  Release:
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  iCodexBarCoreMac:
    type: framework
    platform: macOS
    sources:
      - path: iCodexBar/Core/Models
        excludes:
          - "**/.DS_Store"
      - path: iCodexBar/Core/Utilities
        excludes:
          - "**/.DS_Store"
      - path: iCodexBar/Core/Services/KeychainService.swift
      - path: iCodexBar/Core/Services/NotificationService.swift
      - path: iCodexBar/Core/Services/UsageAPIService.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.icodexbar.core.mac
        PRODUCT_NAME: iCodexBarCore
        PRODUCT_MODULE_NAME: iCodexBarCore
        GENERATE_INFOPLIST_FILE: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @loader_path/../Frameworks @loader_path/Frameworks"
        SKIP_INSTALL: "YES"

  iCodexBarCore:
    type: framework
    platform: iOS
    sources:
      - path: iCodexBar/Core
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.icodexbar.core
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @loader_path/Frameworks"
        SKIP_INSTALL: "YES"

  iCodexBar:
    type: application
    platform: iOS
    sources:
      - path: iCodexBar
        excludes:
          - "**/.DS_Store"
    resources:
      - path: iCodexBar/Resources
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.icodexbar.app
        INFOPLIST_FILE: iCodexBar/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: "YES"
    entitlements:
      path: iCodexBar/Resources/iCodexBar.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.icodexbar.shared
    dependencies:
      - target: iCodexBarWidgetExtension
        embed: true
        codeSign: true

  iCodexBarWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: iCodexBar/Core/Models
        excludes:
          - "**/.DS_Store"
      - path: iCodexBar/Core/Utilities
        excludes:
          - "**/.DS_Store"
      - path: iCodexBarWidget
        excludes:
          - "**/.DS_Store"
      - path: iCodexBar/Core/Models/Provider.swift
      - path: iCodexBar/Core/Models/ProviderUsageSnapshot.swift
      - path: iCodexBar/Core/Models/RateWindow.swift
      - path: iCodexBar/Core/Models/DailyUsageEntry.swift
      - path: iCodexBar/Core/Utilities/CurrencyFormatter.swift
      - path: iCodexBar/Core/Utilities/UsageFormatter.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.icodexbar.app.widget
        INFOPLIST_FILE: iCodexBarWidget/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SKIP_INSTALL: "YES"
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
        CODE_SIGN_ENTITLEMENTS: iCodexBarWidget/iCodexBarWidgetExtension.entitlements
    entitlements:
      path: iCodexBarWidget/iCodexBarWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.icodexbar.shared

  iCodexBarTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: iCodexBarTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.icodexbar.app.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @loader_path/Frameworks"
    dependencies:
      - target: iCodexBarCore

  iCodexBarMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: iCodexBarTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.icodexbar.app.mactests
        GENERATE_INFOPLIST_FILE: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @loader_path/../Frameworks @loader_path/Frameworks"
    dependencies:
      - target: iCodexBarCoreMac

  iCodexBarUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: iCodexBarUITests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.icodexbar.app.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @loader_path/Frameworks"
    dependencies:
      - target: iCodexBar

schemes:
  iCodexBar:
    build:
      targets:
        iCodexBar: all
        iCodexBarWidgetExtension: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - iCodexBarTests
        - iCodexBarUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  iCodexBarTests:
    build:
      targets:
        iCodexBarCore: test
        iCodexBarTests: all
    test:
      config: Debug
      debugEnabled: false
      targets:
        - iCodexBarTests

  iCodexBarMacTests:
    build:
      targets:
        iCodexBarCoreMac: test
        iCodexBarMacTests: all
    test:
      config: Debug
      debugEnabled: false
      targets:
        - iCodexBarMacTests
