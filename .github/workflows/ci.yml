name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}

jobs:
  lint:
    name: Code Quality
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install tools
        run: |
          brew install xcodegen swiftlint swiftformat
          gem install fastlane

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Verify generated project matches committed
        run: |
          if ! git diff --quiet -- iCodexBar.xcodeproj; then
            echo "::error::xcodegen produced a different project than the committed iCodexBar.xcodeproj. Re-run 'xcodegen generate' locally and commit the result."
            git diff --stat -- iCodexBar.xcodeproj
            exit 1
          fi

      - name: SwiftLint
        run: swiftlint --reporter github-actions-logging

      - name: SwiftFormat (check)
        run: swiftformat --lint .

  build:
    name: Build (${{ matrix.configuration }})
    runs-on: macos-15
    needs: lint
    strategy:
      matrix:
        configuration: [Debug, Release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install tools
        run: |
          brew install xcodegen
          gem install fastlane

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          fastlane build_${{ matrix.configuration == 'Debug' && 'debug' || 'release' }}
        env:
          CI: true

  test:
    name: Test
    runs-on: macos-15
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install tools
        run: |
          brew install xcodegen
          gem install fastlane

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        run: fastlane test
        env:
          CI: true

  # Gated behind workflow_dispatch until signing is provisioned (see
  # archive_release in fastlane/Fastfile). The DEVELOPMENT_TEAM secret alone
  # isn't enough — `build_app` with automatic signing also needs a certificate
  # in the keychain and a matching provisioning profile. Run manually from
  # Actions UI when those are wired up (e.g. via `match` or
  # `import_certificate` + `app_store_connect_api_key`).
  beta:
    name: Upload to TestFlight
    runs-on: macos-15
    needs: test
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install tools
        run: |
          brew install xcodegen
          gem install fastlane

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build & Upload
        run: fastlane beta
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
